<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DermaScan AI — Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f0ede8;--surface:#ffffff;--border:#ddd8d0;--text:#1c1a17;--muted:#7a7570;--green:#2d6a4f;--green2:#52b788;--danger:#b83232;--warn:#e67e22;--r:14px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--green);color:white;padding:16px 40px;display:flex;align-items:center;gap:14px;}
header h1{font-family:'Fraunces',serif;font-size:22px;font-weight:400;}
header h1 span{color:var(--green2);}
.nav{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);transition:background .2s;}
.nav a:hover{background:rgba(255,255,255,0.1);}
.nav a.active{background:rgba(255,255,255,0.2);color:white;}
.nav-user{font-size:12px;color:rgba(255,255,255,0.7);margin-right:4px;}
main{max-width:900px;margin:0 auto;padding:28px 24px 60px;}
.page-title{font-family:'Fraunces',serif;font-size:26px;font-weight:400;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;margin-bottom:20px;}
.card-label{font-size:11px;font-weight:500;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}

/* EPISODE CARD */
.ep-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.ep-card.cured{border-left:3px solid var(--green2);opacity:0.8;}
.ep-card.active{border-left:3px solid var(--green);}
.ep-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.ep-title-row{display:flex;align-items:center;gap:10px;}
.ep-disease{font-family:'Fraunces',serif;font-size:20px;font-weight:400;}
.ep-status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;}
.ep-status.active{background:#d8f3dc;color:var(--green);}
.ep-status.cured{background:var(--bg);color:var(--muted);}
.ep-meta{font-size:12px;color:var(--muted);margin-bottom:14px;}
.ep-meta span{margin-right:14px;}
.ep-chart-wrap{height:180px;margin-bottom:12px;}
.cure-btn{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--green);background:white;color:var(--green);cursor:pointer;font-family:inherit;font-weight:500;transition:background .2s;}
.cure-btn:hover{background:#f0faf4;}
.cured-label{font-size:12px;color:var(--muted);font-style:italic;}

/* TREND INFO */
.trend-row{display:flex;gap:12px;margin-bottom:12px;}
.trend-box{flex:1;background:var(--bg);border-radius:8px;padding:10px 14px;text-align:center;}
.trend-box .num{font-size:18px;font-weight:500;color:var(--green);}
.trend-box .num.up{color:var(--danger);}
.trend-box .num.neutral{color:var(--warn);}
.trend-box .lbl{font-size:11px;color:var(--muted);margin-top:2px;}

/* EMPTY / LOADING */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state svg{opacity:.15;margin-bottom:14px;}
.empty-state p{font-size:14px;margin-bottom:12px;}
.empty-state a{color:var(--green);text-decoration:none;font-weight:500;padding:10px 20px;border:1px solid var(--green);border-radius:8px;display:inline-block;}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
.spinner-sm{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
  <h1>Derma<span>Scan</span> AI</h1>
  <div class="nav">
    <span class="nav-user">👤 {{ user_name }}</span>
    <a href="/">New Scan</a>
    <a href="/history">History</a>
    <a href="/progress" class="active">Progress</a>
    <a href="/logout">Logout</a>
  </div>
</header>

<main>
  <div class="page-title">Progress Tracking</div>
  <div class="page-sub">Track each skin condition episode from start to cure</div>

  <div class="loading" id="loading">
    <span class="spinner-sm"></span>Loading your episodes...
  </div>

  <div id="episodes-wrap"></div>

  <div class="empty-state" id="empty-state" style="display:none">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    <p>No episodes tracked yet.</p>
    <a href="/">Start a new scan and create an episode</a>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const diseaseColors = {
  'Acne':'#52b788','Melanoma':'#b83232','Psoriasis':'#e67e22','Rosacea':'#3b82f6','Vitiligo':'#8b5cf6'
};
let charts = {};

window.addEventListener('load', loadEpisodes);

async function loadEpisodes() {
  try {
    const res      = await fetch('/get_all_episodes');
    const episodes = await res.json();
    document.getElementById('loading').style.display = 'none';

    if (episodes.length === 0) {
      document.getElementById('empty-state').style.display = 'block';
      return;
    }

    const wrap = document.getElementById('episodes-wrap');
    wrap.innerHTML = '';

    // Separate active and cured
    const active = episodes.filter(e => e.status === 'active');
    const cured  = episodes.filter(e => e.status === 'cured');

    if (active.length > 0) {
      const label = document.createElement('div');
      label.style.cssText = 'font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:12px;';
      label.textContent = 'Active episodes';
      wrap.appendChild(label);
      active.forEach(ep => wrap.appendChild(buildEpisodeCard(ep)));
    }

    if (cured.length > 0) {
      const label = document.createElement('div');
      label.style.cssText = 'font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin:20px 0 12px;';
      label.textContent = 'Cured episodes';
      wrap.appendChild(label);
      cured.forEach(ep => wrap.appendChild(buildEpisodeCard(ep)));
    }

    // Render charts after DOM is ready
    requestAnimationFrame(() => {
      episodes.forEach(ep => renderEpisodeChart(ep));
    });

  } catch(e) {
    document.getElementById('loading').textContent = 'Error loading episodes.';
  }
}

function buildEpisodeCard(ep) {
  const scans  = ep.scans || [];
  const first  = scans.length > 0 ? scans[0].confidence : null;
  const latest = scans.length > 0 ? scans[scans.length-1].confidence : null;
  const change = (first !== null && latest !== null) ? (latest - first) : null;

  let trendText  = '—';
  let trendClass = '';
  if (change !== null) {
    if      (change <= -5) { trendText = '↓ Improving'; trendClass = ''; }
    else if (change >= 5)  { trendText = '↑ Worsening'; trendClass = 'up'; }
    else                   { trendText = '→ Stable';    trendClass = 'neutral'; }
  }

  const card = document.createElement('div');
  card.className = `ep-card ${ep.status}`;
  card.id        = `ep-card-${ep.id}`;

  card.innerHTML = `
    <div class="ep-header">
      <div>
        <div class="ep-title-row">
          <span class="ep-disease">${ep.display_name || ep.disease}</span>
          <span class="ep-status ${ep.status}">${ep.status === 'active' ? 'Active' : 'Cured ✓'}</span>
        </div>
        <div class="ep-meta">
          <span>Started ${ep.start_date}</span>
          ${ep.end_date ? `<span>Cured ${ep.end_date}</span>` : ''}
          <span>${ep.scan_count} scan${ep.scan_count !== 1 ? 's' : ''}</span>
          ${ep.notes ? `<span style="font-style:italic">"${ep.notes}"</span>` : ''}
        </div>
      </div>
      <div>
        ${ep.status === 'active'
          ? `<button class="cure-btn" onclick="markCured(${ep.id})">Mark as Cured ✓</button>`
          : `<span class="cured-label">Condition resolved</span>`}
      </div>
    </div>

    ${scans.length > 1 ? `
    <div class="trend-row">
      <div class="trend-box">
        <div class="num">${first?.toFixed(1)}%</div>
        <div class="lbl">First scan</div>
      </div>
      <div class="trend-box">
        <div class="num">${latest?.toFixed(1)}%</div>
        <div class="lbl">Latest scan</div>
      </div>
      <div class="trend-box">
        <div class="num ${trendClass}">${change >= 0 ? '+' : ''}${change?.toFixed(1)}%</div>
        <div class="lbl">Change</div>
      </div>
      <div class="trend-box">
        <div class="num ${trendClass}" style="font-size:14px">${trendText}</div>
        <div class="lbl">Trend</div>
      </div>
    </div>` : ''}

    ${scans.length > 0 ? `
    <div class="ep-chart-wrap">
      <canvas id="chart-${ep.id}"></canvas>
    </div>` : `<p style="font-size:13px;color:var(--muted);text-align:center;padding:20px">No scans linked to this episode yet.</p>`}
  `;

  return card;
}

function renderEpisodeChart(ep) {
  const canvas = document.getElementById(`chart-${ep.id}`);
  if (!canvas) return;
  const scans = ep.scans || [];
  if (scans.length === 0) return;

  const color = diseaseColors[ep.disease] || '#52b788';

  if (charts[ep.id]) charts[ep.id].destroy();

  charts[ep.id] = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels:   scans.map((s, i) => `Scan ${i+1}`),
      datasets: [{
        label:           ep.disease,
        data:            scans.map(s => s.confidence),
        borderColor:     color,
        backgroundColor: color + '18',
        tension:         0.35,
        pointRadius:     5,
        pointHoverRadius:8,
        pointBackgroundColor: color,
        fill:            true,
        borderWidth:     2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: item => ` Confidence: ${item.raw.toFixed(1)}%`,
            afterLabel: item => {
              const idx = item.dataIndex;
              return scans[idx]?.date ? `  Date: ${scans[idx].date}` : '';
            }
          }
        }
      },
      scales: {
        x: { ticks: { font: { size: 10 } }, grid: { color: '#f0ede8' } },
        y: {
          min: 0, max: 100,
          ticks: { font: { size: 10 }, callback: v => v + '%' },
          grid: { color: '#f0ede8' }
        }
      }
    }
  });
}

async function markCured(episodeId) {
  if (!confirm('Mark this episode as cured? This means the condition has resolved.')) return;
  try {
    await fetch(`/cure_episode/${episodeId}`, { method: 'POST' });
    loadEpisodes(); // reload page
  } catch(e) {
    alert('Could not update episode. Try again.');
  }
}
</script>
</body>
</html>
